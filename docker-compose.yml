services:
  birdview:
    build: .
    container_name: birdview
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "8080:8080"
    volumes:
      # Change this to the actual directory you want to scan on your host
      - /Users/emilqvarnstrom:/data:ro
      # Persistent volume for BirdView's database and settings
      - birdview_data:/app/data
    environment:
      - TZ=Europe/Stockholm
      - BIRDVIEW_SCAN_INTERVAL_DAYS=7
      - PORT=8080
      - PUID=0
      - PGID=0

volumes:
  birdview_data:
